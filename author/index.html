<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SN Author">
<meta name="mobile-web-app-capable" content="yes">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#000080">
<title>Spatial Narrative — Authoring Tool</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
:root {
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-left: env(safe-area-inset-left, 0px);
  --safe-right: env(safe-area-inset-right, 0px);
  --bg: #c0c0c0;
  --panel: #d4d0c8;
  --border-light: #ffffff;
  --border-dark: #404040;
  --border-mid: #808080;
  --navy: #000080;
  --orange: #ff9900;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  overscroll-behavior: none;
}
body {
  font-family: Arial, Helvetica, sans-serif;
  font-size: 14px;
  background: var(--bg);
  color: #000;
  display: flex;
  flex-direction: column;
  padding-top: var(--safe-top);
  padding-bottom: var(--safe-bottom);
  padding-left: var(--safe-left);
  padding-right: var(--safe-right);
}

.titlebar {
  background: linear-gradient(90deg, var(--navy), #1084d0);
  color: #fff;
  padding: 6px 12px;
  font-weight: bold;
  font-size: 14px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-shrink: 0;
  min-height: 38px;
}

.toolbar {
  background: var(--panel);
  border-bottom: 2px solid var(--border-mid);
  padding: 6px 10px;
  display: flex;
  gap: 6px;
  align-items: center;
  flex-wrap: wrap;
  flex-shrink: 0;
}
@media (max-width: 600px) {
  .toolbar { padding: 4px 8px; gap: 4px; }
}

.btn {
  background: var(--panel);
  border-top: 2px solid var(--border-light);
  border-left: 2px solid var(--border-light);
  border-right: 2px solid var(--border-dark);
  border-bottom: 2px solid var(--border-dark);
  padding: 4px 10px;
  cursor: pointer;
  font-size: 13px;
  font-family: Arial, sans-serif;
  min-height: 36px;
  min-width: 36px;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}
.btn:active {
  border-top: 2px solid var(--border-dark);
  border-left: 2px solid var(--border-dark);
  border-right: 2px solid var(--border-light);
  border-bottom: 2px solid var(--border-light);
}
.btn.danger { color: #cc0000; }
.btn.primary { font-weight: bold; }
@media (max-width: 600px) {
  .btn-label { display: none; }
  .btn-icon { display: inline; }
}
@media (min-width: 601px) {
  .btn-icon { display: none; }
  .btn-label { display: inline; }
}

#tokenInput {
  border: 2px inset var(--border-mid);
  padding: 3px 6px;
  font-size: 13px;
  background: #fff;
  flex: 1;
  min-width: 0;
  max-width: 220px;
}
@media (max-width: 600px) {
  #tokenInput { max-width: 100%; font-size: 16px; }
  #commitMsgInput { font-size: 16px; flex: 1; min-width: 0; }
}
#commitMsgInput {
  border: 2px inset var(--border-mid);
  padding: 3px 6px;
  font-size: 13px;
  background: #fff;
  width: 200px;
}

.main {
  display: flex;
  flex: 1;
  overflow: hidden;
  min-height: 0;
}

@media (min-width: 601px) {
  #map { flex: 1; height: 100%; cursor: crosshair; }
  .sidebar {
    width: 360px;
    background: var(--panel);
    border-left: 2px solid var(--border-mid);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    flex-shrink: 0;
  }
}

@media (max-width: 600px) {
  .main { flex-direction: column; position: relative; }
  #map {
    position: absolute;
    inset: 0;
    z-index: 1;
    transition: opacity 0.15s;
  }
  #map.panel-hidden { opacity: 0; pointer-events: none; }
  .sidebar {
    position: absolute;
    inset: 0;
    z-index: 2;
    background: var(--panel);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transition: transform 0.2s;
  }
  .sidebar.panel-hidden { transform: translateX(100%); }
}

.bottom-nav { display: none; }
@media (max-width: 600px) {
  .bottom-nav {
    display: flex;
    background: var(--panel);
    border-top: 2px solid var(--border-mid);
    flex-shrink: 0;
    z-index: 10;
  }
  .bottom-nav .bnav-btn {
    flex: 1;
    padding: 10px 4px 8px;
    text-align: center;
    font-size: 11px;
    font-weight: bold;
    cursor: pointer;
    border: none;
    background: var(--panel);
    color: #000;
    border-right: 1px solid var(--border-mid);
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    min-height: 52px;
  }
  .bottom-nav .bnav-btn:last-child { border-right: none; }
  .bottom-nav .bnav-btn.active { background: var(--navy); color: #fff; }
  .bottom-nav .bnav-btn .bnav-icon { font-size: 18px; line-height: 1; }
}

.passage-list {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 6px;
  background: #fff;
  border: 2px inset var(--border-mid);
  margin: 0 4px;
}
.passage-item {
  padding: 10px 8px;
  cursor: pointer;
  border-bottom: 1px solid #e0e0e0;
  display: flex;
  justify-content: space-between;
  align-items: center;
  -webkit-tap-highlight-color: transparent;
  min-height: 44px;
}
.passage-item:active, .passage-item:hover { background: var(--navy); color: #fff; }
.passage-item.selected { background: var(--navy); color: #fff; }
.passage-item .ptags {
  font-size: 11px;
  opacity: 0.7;
  font-style: italic;
}

.editor-panel {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 10px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  background: var(--panel);
}
.field-row {
  display: flex;
  flex-direction: column;
  gap: 3px;
}
.field-row label {
  font-size: 12px;
  font-weight: bold;
  text-transform: uppercase;
  letter-spacing: 0.3px;
}
.field-row input,
.field-row textarea,
.field-row select {
  border: 2px inset var(--border-mid);
  padding: 6px 8px;
  font-size: 16px;
  font-family: "Times New Roman", serif;
  background: #fff;
  width: 100%;
  -webkit-appearance: none;
  border-radius: 0;
}
@media (min-width: 601px) {
  .field-row input,
  .field-row textarea,
  .field-row select { font-size: 13px; padding: 4px 6px; }
}
.field-row textarea {
  resize: vertical;
  min-height: 80px;
}

.dir-rules { display: flex; flex-direction: column; gap: 4px; }
.dir-rule {
  display: flex;
  gap: 4px;
  align-items: center;
}
.dir-rule input {
  width: 60px;
  border: 2px inset var(--border-mid);
  padding: 3px 5px;
  font-size: 16px;
  background: #fff;
}
@media (min-width: 601px) {
  .dir-rule input { font-size: 12px; }
}
.dir-rule input.target { flex: 1; width: auto; }
.dir-rule .remove-dir {
  background: var(--panel);
  border-top: 2px solid var(--border-light);
  border-left: 2px solid var(--border-light);
  border-right: 2px solid var(--border-dark);
  border-bottom: 2px solid var(--border-dark);
  cursor: pointer;
  padding: 4px 8px;
  font-size: 14px;
  color: #cc0000;
  min-height: 36px;
}

.tab-bar {
  display: flex;
  border-bottom: 2px solid var(--border-mid);
  flex-shrink: 0;
}
.tab {
  padding: 8px 12px;
  cursor: pointer;
  font-size: 12px;
  font-weight: bold;
  border-right: 1px solid var(--border-mid);
  background: #c0c0c0;
  min-height: 36px;
  display: flex;
  align-items: center;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}
.tab.active {
  background: var(--panel);
  border-bottom: 2px solid var(--panel);
  margin-bottom: -2px;
}
.tab-content { display: none; flex: 1; overflow: hidden; flex-direction: column; }
.tab-content.active { display: flex; }

.statusbar {
  background: var(--panel);
  border-top: 2px solid var(--border-light);
  padding: 4px 10px;
  font-size: 12px;
  flex-shrink: 0;
  display: flex;
  justify-content: space-between;
}
@media (max-width: 600px) {
  .statusbar { display: none; }
}

.notice {
  padding: 8px 10px;
  font-size: 13px;
  background: #ffffe1;
  border: 1px solid var(--border-mid);
  margin: 4px;
}
.notice.error { background: #ffe1e1; }
.notice.success { background: #e1ffe1; }

.section-label {
  font-size: 11px;
  font-weight: bold;
  text-transform: uppercase;
  color: var(--navy);
  margin-bottom: 3px;
}
#passageSearch {
  width: 100%;
  border: 2px inset var(--border-mid);
  padding: 8px 8px;
  font-size: 16px;
  background: #fff;
  margin-bottom: 4px;
  -webkit-appearance: none;
  border-radius: 0;
}
@media (min-width: 601px) {
  #passageSearch { font-size: 13px; padding: 4px 6px; }
}
.coord-hint {
  font-size: 11px;
  color: #666;
  font-style: italic;
}

.map-popup {
  font-family: Arial, Helvetica, sans-serif;
  font-size: 13px;
  min-width: 200px;
}
.map-popup .popup-title {
  font-weight: bold;
  font-size: 12px;
  text-transform: uppercase;
  background: var(--navy);
  color: #fff;
  padding: 4px 8px;
  margin: -8px -12px 8px -12px;
}
.map-popup input[type="text"] {
  width: 100%;
  border: 2px inset var(--border-mid);
  padding: 6px 8px;
  font-size: 16px;
  margin-bottom: 6px;
  background: #fff;
  font-family: "Times New Roman", serif;
  -webkit-appearance: none;
  border-radius: 0;
}
.map-popup .popup-coords {
  font-size: 11px;
  color: #555;
  margin-bottom: 8px;
  font-style: italic;
}
.map-popup .popup-actions { display: flex; gap: 6px; }
.map-popup .btn { flex: 1; }

/* Links field: chip-style tags for each [[Link]] */
.link-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  background: #fff;
  border: 2px inset var(--border-mid);
  padding: 6px;
  min-height: 36px;
}
.link-chip {
  background: var(--navy);
  color: #fff;
  font-size: 12px;
  padding: 3px 6px 3px 8px;
  display: flex;
  align-items: center;
  gap: 4px;
  font-family: Arial, sans-serif;
}
.link-chip .remove-link {
  cursor: pointer;
  font-size: 14px;
  line-height: 1;
  color: #fff;
  background: none;
  border: none;
  padding: 0 2px;
  -webkit-tap-highlight-color: transparent;
}
.link-hint {
  font-size: 11px;
  color: #666;
  font-style: italic;
  margin-top: 2px;
}
/* Link helper buttons (add from existing passages) */
.link-helper {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-top: 2px;
}
</style>

<body>

<div class="titlebar">
  <span>Spatial Narrative — Authoring Tool</span>
  <span id="repoLabel" style="font-size:11px;opacity:0.8;">jonathaniscarroll/spatial-narrative</span>
</div>

<div class="toolbar">
  <input type="password" id="tokenInput" placeholder="GitHub PAT (repo scope)" autocomplete="current-password">
  <button class="btn" id="loadBtn" title="Load story/main.twee">
    <span class="btn-icon">📂</span><span class="btn-label">Load</span>
  </button>
  <button class="btn primary" id="saveBtn" title="Save to GitHub">
    <span class="btn-icon">💾</span><span class="btn-label">Save</span>
  </button>
  <button class="btn danger" id="deleteBtn" title="Delete selected passage">
    <span class="btn-icon">🗑</span><span class="btn-label">Delete</span>
  </button>
  <input type="text" id="commitMsgInput" placeholder="Commit message">
</div>

<div id="noticeArea"></div>

<div class="main">
  <div id="map"></div>

  <div class="sidebar" id="sidebar">
    <div class="tab-bar">
      <div class="tab active" data-tab="passages">Passages</div>
      <div class="tab" data-tab="editor">Editor</div>
      <div class="tab" data-tab="raw">Raw</div>
    </div>

    <div class="tab-content active" id="tab-passages" style="flex-direction:column;padding:8px;gap:6px;">
      <div class="section-label">All Passages</div>
      <input type="text" id="passageSearch" placeholder="Search passages..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
      <div class="passage-list" id="passageList"></div>
    </div>

    <div class="tab-content" id="tab-editor">
      <div class="editor-panel" id="editorPanel">
        <div class="notice">Tap anywhere on the map to place a new geo passage, or select an existing marker.</div>
      </div>
    </div>

    <div class="tab-content" id="tab-raw" style="flex-direction:column;padding:8px;gap:6px;">
      <div class="section-label">Generated .twee block for selected passage</div>
      <textarea id="rawPreview" style="flex:1;font-family:monospace;font-size:12px;background:#fff;border:2px inset #808080;padding:6px;resize:none;" readonly></textarea>
    </div>
  </div>
</div>

<nav class="bottom-nav" id="bottomNav">
  <button class="bnav-btn active" data-view="map" id="bnavMap">
    <span class="bnav-icon">🗺</span>Map
  </button>
  <button class="bnav-btn" data-view="passages" id="bnavPassages">
    <span class="bnav-icon">📋</span>Passages
  </button>
  <button class="bnav-btn" data-view="editor" id="bnavEditor">
    <span class="bnav-icon">✏️</span>Editor
  </button>
  <button class="bnav-btn" data-view="raw" id="bnavRaw">
    <span class="bnav-icon">🔤</span>Raw
  </button>
</nav>

<div class="statusbar">
  <span id="statusText">Load story/main.twee to begin. Click the map to add a passage.</span>
  <span id="passageCount"></span>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const OWNER = 'jonathaniscarroll';
const REPO = 'spatial-narrative';
const FILE_PATH = 'story/main.twee';
const BRANCH = 'main';

let passages = [];
let selectedIndex = null;
let fileSha = null;
let markers = {};
let activePopup = null;

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}

const isMobile = () => window.innerWidth <= 600;

function setMobileView(view) {
  if (!isMobile()) return;
  const mapEl = document.getElementById('map');
  const sidebar = document.getElementById('sidebar');
  if (view === 'map') {
    mapEl.classList.remove('panel-hidden');
    sidebar.classList.add('panel-hidden');
  } else {
    mapEl.classList.add('panel-hidden');
    sidebar.classList.remove('panel-hidden');
    if (view === 'passages' || view === 'editor' || view === 'raw') switchTab(view);
  }
  document.querySelectorAll('.bnav-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.view === view);
  });
}

document.querySelectorAll('.bnav-btn').forEach(btn => {
  btn.addEventListener('click', () => setMobileView(btn.dataset.view));
});

const map = L.map('map', { tap: true, tapTolerance: 15 }).setView([44.648, -63.575], 15);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap contributors'
}).addTo(map);

map.on('click', function(e) {
  if (activePopup) { map.closePopup(activePopup); activePopup = null; }
  const lat = e.latlng.lat.toFixed(6);
  const lng = e.latlng.lng.toFixed(6);
  const container = document.createElement('div');
  container.className = 'map-popup';
  container.innerHTML = `
    <div class="popup-title">New Geo Passage</div>
    <div class="popup-coords">${lat}, ${lng}</div>
    <input type="text" id="popupName" placeholder="Passage name" autocorrect="off" autocapitalize="off" spellcheck="false">
    <div class="popup-actions">
      <button class="btn primary" id="popupCreate">Create</button>
      <button class="btn" id="popupCancel">Cancel</button>
    </div>
  `;
  activePopup = L.popup({ closeButton: false, minWidth: 240 })
    .setLatLng(e.latlng).setContent(container).openOn(map);
  setTimeout(() => { const input = document.getElementById('popupName'); if (input) input.focus(); }, 50);
  container.querySelector('#popupCreate').addEventListener('click', () => {
    const nameInput = document.getElementById('popupName');
    const name = nameInput ? nameInput.value.trim() : '';
    if (!name) { nameInput.style.outline = '2px solid red'; return; }
    passages.push({ name, tags: ['geo'], lat: parseFloat(lat), lng: parseFloat(lng),
      radius: 20, lede: '', dwell: 12000, after: null, then: null, facing: null, dirs: [], links: [], body: '' });
    map.closePopup(activePopup); activePopup = null;
    const i = passages.length - 1;
    buildMarkers(); renderPassageList('');
    selectPassage(i);
    setStatus('Created "' + name + '" at ' + lat + ', ' + lng + '.');
  });
  container.querySelector('#popupCancel').addEventListener('click', () => {
    map.closePopup(activePopup); activePopup = null;
  });
  const nameInput = container.querySelector('#popupName');
  if (nameInput) nameInput.addEventListener('keydown', ev => {
    if (ev.key === 'Enter') container.querySelector('#popupCreate').click();
    if (ev.key === 'Escape') container.querySelector('#popupCancel').click();
  });
});

// ── Parse [[links]] out of body text into a separate array ────────────────
function extractLinks(bodyText) {
  const links = [];
  const seen = Object.create(null);
  const chunks = bodyText.split('[[');
  chunks.slice(1).forEach(chunk => {
    const end = chunk.indexOf(']]');
    if (end === -1) return;
    let raw = chunk.slice(0, end).trim();
    let target = raw;
    if (raw.indexOf('->') !== -1)      { target = raw.split('->')[1].trim(); }
    else if (raw.indexOf('<-') !== -1) { target = raw.split('<-')[0].trim(); }
    else if (raw.indexOf('|') !== -1)  { target = raw.split('|')[1].trim(); }
    if (target && !seen[target]) { seen[target] = true; links.push(target); }
  });
  return links;
}

// Strip [[...]] from body text (they live in the links array now)
function stripLinks(bodyText) {
  return bodyText.replace(/\[\[[^\]]*\]\]/g, '').replace(/\n{3,}/g, '\n\n').trim();
}

function parseTwee(text) {
  const blocks = text.split(/(?=^:: )/m).filter(b => b.trim());
  return blocks.map(block => {
    const lines = block.split('\n');
    const header = lines[0];
    const headerMatch = header.match(/^:: (.+?)(?:\s+\[(.*)\])?\s*$/);
    if (!headerMatch) return null;
    const name = headerMatch[1].trim();
    const tags = headerMatch[2] ? headerMatch[2].split(/\s+/).filter(Boolean) : [];
    let lat = null, lng = null, radius = 30;
    let lede = '', dwell = null, after = null, then_ = null, facing = null;
    const dirs = []; const bodyLines = [];
    lines.slice(1).forEach(line => {
      const t = line.trim();
      if (t.startsWith('@geo ')) {
        const parts = t.slice(5).split(',').map(v => parseFloat(v.trim()));
        lat = parts[0]; lng = parts[1]; if (isFinite(parts[2])) radius = parts[2];
      } else if (t.startsWith('@lede ')) { lede = t.slice(6).trim();
      } else if (t.startsWith('@dwell ')) { dwell = parseInt(t.slice(7).trim(), 10);
      } else if (t.startsWith('@after ')) { after = parseInt(t.slice(7).trim(), 10);
      } else if (t.startsWith('@then ')) { then_ = t.slice(6).trim();
      } else if (t.startsWith('@facing ')) { facing = parseFloat(t.slice(8).trim());
      } else if (t.startsWith('@dir ')) {
        const spec = t.slice(5).trim(); const pair = spec.split(':');
        if (pair.length === 2) { const range = pair[0].split('-');
          dirs.push({ start: parseFloat(range[0]), end: parseFloat(range[1]), target: pair[1].trim() }); }
      } else if (t.startsWith('<span class="nav-hidden">')) {
      } else { bodyLines.push(line); }
    });
    const rawBody = bodyLines.join('\n').replace(/^\n+|\n+$/g, '');
    // Separate [[links]] from prose body
    const links = extractLinks(rawBody);
    const body  = stripLinks(rawBody);
    return { name, tags, lat, lng, radius, lede, dwell, after, then: then_, facing, dirs, links, body, _raw: block };
  }).filter(Boolean);
}

function serializePassage(p) {
  const tagStr = p.tags.length ? ' [' + p.tags.join(' ') + ']' : '';
  let out = ':: ' + p.name + tagStr + '\n';
  if (p.tags.includes('geo') && isFinite(p.lat) && isFinite(p.lng))
    out += '@geo ' + p.lat.toFixed(6) + ',' + p.lng.toFixed(6) + ',' + (p.radius || 30) + '\n';
  if (p.lede)   out += '@lede ' + p.lede + '\n';
  if (p.dwell != null) out += '@dwell ' + p.dwell + '\n';
  if (p.facing != null) out += '@facing ' + p.facing + '\n';
  if (p.after != null) out += '@after ' + p.after + '\n';
  if (p.then)   out += '@then ' + p.then + '\n';
  p.dirs.forEach(d => { out += '@dir ' + d.start + '-' + d.end + ':' + d.target + '\n'; });
  // Body prose
  if (p.body)  out += '\n' + p.body + '\n';
  // [[Links]] — each on its own line, always present if any
  if (p.links && p.links.length > 0) {
    out += '\n' + p.links.map(l => '[[' + l + ']]').join('\n') + '\n';
  }
  return out;
}
function serializeAll() { return passages.map(serializePassage).join('\n'); }

function clearMarkers() { Object.values(markers).forEach(m => map.removeLayer(m)); markers = {}; }
function buildMarkers() {
  clearMarkers();
  passages.forEach((p, i) => {
    if (!p.tags.includes('geo') || !isFinite(p.lat) || !isFinite(p.lng)) return;
    const isSelected = i === selectedIndex;
    const icon = L.divIcon({
      className: '',
      html: '<div style="width:14px;height:14px;background:' + (isSelected ? '#ff9900' : '#000080') + ';border:2px solid #fff;border-radius:50%;box-shadow:0 0 3px #000;"></div>',
      iconSize: [14, 14], iconAnchor: [7, 7]
    });
    const marker = L.marker([p.lat, p.lng], { icon, draggable: true }).addTo(map);
    marker.bindTooltip(p.name, { permanent: false, direction: 'top' });
    marker.on('click', e => {
      L.DomEvent.stopPropagation(e);
      if (activePopup) { map.closePopup(activePopup); activePopup = null; }
      selectPassage(i);
    });
    marker.on('dragend', e => {
      const ll = e.target.getLatLng();
      passages[i].lat = parseFloat(ll.lat.toFixed(6));
      passages[i].lng = parseFloat(ll.lng.toFixed(6));
      if (selectedIndex === i) renderEditor();
      setStatus('Moved ' + passages[i].name + ' to ' + passages[i].lat + ', ' + passages[i].lng);
      updateRawPreview();
    });
    if (isFinite(p.radius))
      L.circle([p.lat, p.lng], { radius: p.radius, color: '#000080', weight: 1, fillOpacity: 0.08 }).addTo(map);
    markers[i] = marker;
  });
}

function renderPassageList(filter) {
  const list = document.getElementById('passageList');
  list.innerHTML = '';
  passages.forEach((p, i) => {
    if (filter && !p.name.toLowerCase().includes(filter.toLowerCase())) return;
    const item = document.createElement('div');
    item.className = 'passage-item' + (i === selectedIndex ? ' selected' : '');
    item.innerHTML = '<span>' + escHtml(p.name) + '</span><span class="ptags">' + p.tags.join(' ') + '</span>';
    item.addEventListener('click', () => selectPassage(i));
    list.appendChild(item);
  });
  document.getElementById('passageCount').textContent = passages.length + ' passages';
}

function selectPassage(i) {
  selectedIndex = i;
  buildMarkers();
  renderPassageList(document.getElementById('passageSearch').value);
  renderEditor(); updateRawPreview();
  if (isMobile()) { setMobileView('editor'); } else { switchTab('editor'); }
  const p = passages[i];
  if (isFinite(p.lat) && isFinite(p.lng)) map.panTo([p.lat, p.lng]);
}

// ── Render the links chips UI ──────────────────────────────────────────────
// Reads from passages[selectedIndex].links and renders chip buttons.
// Removing a chip immediately writes back to the passage and refreshes raw.
function renderLinkChips() {
  const p = passages[selectedIndex];
  const container = document.getElementById('linkChips');
  if (!container) return;
  container.innerHTML = '';
  (p.links || []).forEach((name, li) => {
    const chip = document.createElement('span');
    chip.className = 'link-chip';
    chip.innerHTML = escHtml(name) +
      '<button class="remove-link" title="Remove link" data-li="' + li + '">✕</button>';
    chip.querySelector('.remove-link').addEventListener('click', () => {
      p.links.splice(li, 1);
      renderLinkChips();
      updateRawPreview();
    });
    container.appendChild(chip);
  });
}

function renderEditor() {
  const panel = document.getElementById('editorPanel');
  if (selectedIndex === null || !passages[selectedIndex]) {
    panel.innerHTML = '<div class="notice">No passage selected.</div>'; return;
  }
  const p = passages[selectedIndex];
  const isGeo = p.tags.includes('geo');
  // Ensure links array exists (handles passages loaded before this field existed)
  if (!Array.isArray(p.links)) p.links = [];

  panel.innerHTML = `
    <div class="field-row">
      <label>Passage Name</label>
      <input type="text" id="f_name" value="${escAttr(p.name)}" autocorrect="off" autocapitalize="off" spellcheck="false">
    </div>
    <div class="field-row">
      <label>Tags (space separated)</label>
      <input type="text" id="f_tags" value="${escAttr(p.tags.join(' '))}" autocorrect="off" autocapitalize="off" spellcheck="false">
    </div>
    ${isGeo ? `
    <div class="field-row">
      <label>Latitude</label>
      <input type="number" step="0.000001" id="f_lat" value="${p.lat ?? ''}" inputmode="decimal">
      <span class="coord-hint">Drag marker on map to update, or type here.</span>
    </div>
    <div class="field-row">
      <label>Longitude</label>
      <input type="number" step="0.000001" id="f_lng" value="${p.lng ?? ''}" inputmode="decimal">
    </div>
    <div class="field-row">
      <label>Radius (metres)</label>
      <input type="number" id="f_radius" value="${p.radius ?? 30}" inputmode="numeric">
    </div>
    <div class="field-row">
      <label>Dwell (ms)</label>
      <input type="number" id="f_dwell" value="${p.dwell ?? ''}" placeholder="12000" inputmode="numeric">
    </div>
    <div class="field-row">
      <label>Facing Threshold (degrees, optional)</label>
      <input type="number" id="f_facing" value="${p.facing ?? ''}" placeholder="35" inputmode="numeric">
    </div>
    <div class="field-row">
      <label>After (ms until second-stage)</label>
      <input type="number" id="f_after" value="${p.after ?? ''}" placeholder="leave blank if none" inputmode="numeric">
    </div>
    <div class="field-row">
      <label>Then (second-stage passage name)</label>
      <input type="text" id="f_then" value="${escAttr(p.then ?? '')}" placeholder="leave blank if none" autocorrect="off" autocapitalize="off" spellcheck="false">
    </div>
    <div class="field-row">
      <label>Directional Variants (@dir)</label>
      <div class="dir-rules" id="dirRules">
        ${p.dirs.map((d, di) => `
          <div class="dir-rule" data-di="${di}">
            <input type="number" class="dir-start" value="${d.start}" placeholder="start°" inputmode="numeric">
            <span>-</span>
            <input type="number" class="dir-end" value="${d.end}" placeholder="end°" inputmode="numeric">
            <input type="text" class="target" value="${escAttr(d.target)}" placeholder="passage name" autocorrect="off" autocapitalize="off" spellcheck="false">
            <button class="remove-dir" data-di="${di}">✕</button>
          </div>
        `).join('')}
      </div>
      <button class="btn" id="addDirBtn" style="margin-top:4px;">+ Add @dir Rule</button>
    </div>
    ` : ''}
    <div class="field-row">
      <label>Lede</label>
      <input type="text" id="f_lede" value="${escAttr(p.lede ?? '')}">
    </div>
    <div class="field-row">
      <label>Body Text (prose only — links are managed below)</label>
      <textarea id="f_body" rows="6">${escHtml(p.body ?? '')}</textarea>
    </div>
    <div class="field-row">
      <label>Linked Passages <span style="font-weight:normal;font-style:italic;text-transform:none;">(appear in compass; serialised as [[Name]])</span></label>
      <div class="link-chips" id="linkChips"></div>
      <span class="link-hint">Tap a passage below to add it as a link — changes save immediately.</span>
    </div>
    <div class="field-row">
      <label>Add Link</label>
      <div class="link-helper" id="linkHelper"></div>
    </div>
    <button class="btn primary" id="applyBtn" style="margin-bottom:8px;">Apply Changes</button>
  `;

  // Populate chips
  renderLinkChips();

  // Populate add-link helper buttons
  const helper = document.getElementById('linkHelper');
  passages.forEach((other, idx) => {
    if (idx === selectedIndex) return;
    const btn = document.createElement('button');
    btn.type = 'button'; btn.className = 'btn'; btn.textContent = other.name;
    btn.addEventListener('click', () => {
      const p2 = passages[selectedIndex];
      if (!Array.isArray(p2.links)) p2.links = [];
      if (!p2.links.includes(other.name)) {
        p2.links.push(other.name);
        renderLinkChips();
        updateRawPreview();
        setStatus('Linked "' + other.name + '" to "' + p2.name + '". Apply + Save to commit.');
      }
    });
    helper.appendChild(btn);
  });
  if (!helper.childNodes.length) {
    const empty = document.createElement('span');
    empty.textContent = 'No other passages yet.';
    helper.appendChild(empty);
  }

  document.getElementById('applyBtn').addEventListener('click', applyEdits);

  const addDir = document.getElementById('addDirBtn');
  if (addDir) addDir.addEventListener('click', () => {
    passages[selectedIndex].dirs.push({ start: 0, end: 45, target: '' });
    renderEditor(); updateRawPreview();
  });
  document.querySelectorAll('.remove-dir').forEach(btn => {
    btn.addEventListener('click', () => {
      const di = parseInt(btn.dataset.di, 10);
      passages[selectedIndex].dirs.splice(di, 1);
      renderEditor(); updateRawPreview();
    });
  });
}

function applyEdits() {
  if (selectedIndex === null) return;
  const p = passages[selectedIndex];
  p.name = document.getElementById('f_name').value.trim();
  p.tags = document.getElementById('f_tags').value.trim().split(/\s+/).filter(Boolean);
  p.lede = document.getElementById('f_lede').value.trim();
  // Body: strip any [[links]] the author may have typed directly; they belong in p.links
  const rawBody = document.getElementById('f_body').value;
  const inlineLinks = extractLinks(rawBody);
  inlineLinks.forEach(l => {
    if (!p.links) p.links = [];
    if (!p.links.includes(l)) p.links.push(l);
  });
  p.body = stripLinks(rawBody);
  if (p.tags.includes('geo')) {
    p.lat = parseFloat(document.getElementById('f_lat').value);
    p.lng = parseFloat(document.getElementById('f_lng').value);
    p.radius = parseFloat(document.getElementById('f_radius').value) || 30;
    p.dwell = parseInt(document.getElementById('f_dwell').value, 10) || null;
    const facingVal = parseFloat(document.getElementById('f_facing').value);
    p.facing = isFinite(facingVal) ? facingVal : null;
    const afterVal = parseInt(document.getElementById('f_after').value, 10);
    p.after = isFinite(afterVal) ? afterVal : null;
    p.then = document.getElementById('f_then').value.trim() || null;
    const dirRules = document.querySelectorAll('.dir-rule');
    p.dirs = Array.from(dirRules).map(row => ({
      start: parseFloat(row.querySelector('.dir-start').value),
      end: parseFloat(row.querySelector('.dir-end').value),
      target: row.querySelector('.target').value.trim()
    })).filter(d => isFinite(d.start) && isFinite(d.end) && d.target);
  }
  buildMarkers();
  renderPassageList(document.getElementById('passageSearch').value);
  renderEditor();
  updateRawPreview();
  setStatus('Applied changes to "' + p.name + '".');
}

function updateRawPreview() {
  const el = document.getElementById('rawPreview');
  if (selectedIndex !== null && passages[selectedIndex]) el.value = serializePassage(passages[selectedIndex]);
  else el.value = '';
}

function getToken() { return document.getElementById('tokenInput').value.trim(); }

async function loadFile() {
  const token = getToken();
  if (!token) { showNotice('Enter a GitHub Personal Access Token first.', 'error'); return; }
  setStatus('Loading story/main.twee...');
  try {
    const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE_PATH}?ref=${BRANCH}`, {
      headers: { 'Authorization': 'token ' + token, 'Accept': 'application/vnd.github.v3+json' }
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    fileSha = data.sha;
    const decoded = decodeBase64Unicode(data.content.replace(/\n/g, ''));
    passages = parseTwee(decoded);
    buildMarkers(); renderPassageList('');
    setStatus('Loaded ' + passages.length + ' passages from story/main.twee.');
    showNotice('Loaded ' + passages.length + ' passages.', 'success');
    const geoPassages = passages.filter(p => p.tags.includes('geo') && isFinite(p.lat));
    if (geoPassages.length > 0) {
      const lats = geoPassages.map(p => p.lat);
      const lngs = geoPassages.map(p => p.lng);
      map.fitBounds([[Math.min(...lats)-0.002, Math.min(...lngs)-0.002],[Math.max(...lats)+0.002, Math.max(...lngs)+0.002]]);
    }
  } catch(e) { showNotice('Load failed: ' + e.message, 'error'); setStatus('Load failed.'); }
}

async function saveFile() {
  const token = getToken();
  if (!token) { showNotice('Enter a GitHub Personal Access Token first.', 'error'); return; }
  if (!fileSha) { showNotice('Load the file first before saving.', 'error'); return; }
  const msg = document.getElementById('commitMsgInput').value.trim() || 'Update story/main.twee via authoring tool';
  const content = serializeAll();
  const encoded = btoa(unescape(encodeURIComponent(content)));
  setStatus('Saving...');
  try {
    const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE_PATH}`, {
      method: 'PUT',
      headers: { 'Authorization': 'token ' + token, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: msg, content: encoded, sha: fileSha, branch: BRANCH })
    });
    if (!res.ok) { const err = await res.json(); throw new Error(err.message || 'HTTP ' + res.status); }
    const data = await res.json();
    fileSha = data.content.sha;
    showNotice('Saved. Commit: ' + data.commit.sha.slice(0,7), 'success');
    setStatus('Saved to story/main.twee.');
  } catch(e) { showNotice('Save failed: ' + e.message, 'error'); setStatus('Save failed.'); }
}

function deletePassage() {
  if (selectedIndex === null) { showNotice('Select a passage first.', 'error'); return; }
  const name = passages[selectedIndex].name;
  if (!confirm('Delete passage "' + name + '"? This cannot be undone until you reload.')) return;
  passages.splice(selectedIndex, 1); selectedIndex = null;
  buildMarkers(); renderPassageList('');
  document.getElementById('editorPanel').innerHTML = '<div class="notice">Passage deleted. Save to commit.</div>';
  document.getElementById('rawPreview').value = '';
  setStatus('Deleted "' + name + '".');
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s) { return String(s).replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function setStatus(msg) { document.getElementById('statusText').textContent = msg; }
function showNotice(msg, type) {
  const area = document.getElementById('noticeArea');
  const div = document.createElement('div');
  div.className = 'notice' + (type === 'error' ? ' error' : type === 'success' ? ' success' : '');
  div.textContent = msg; area.innerHTML = ''; area.appendChild(div);
  setTimeout(() => div.remove(), 5000);
}
function decodeBase64Unicode(b64) {
  return decodeURIComponent(atob(b64).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join(''));
}
function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === name));
  document.querySelectorAll('.tab-content').forEach(tc => tc.classList.toggle('active', tc.id === 'tab-' + name));
}
function insertAtCursor(textarea, text) {
  const start = textarea.selectionStart ?? textarea.value.length;
  const end = textarea.selectionEnd ?? textarea.value.length;
  textarea.value = textarea.value.slice(0, start) + text + textarea.value.slice(end);
  const newPos = start + text.length;
  textarea.selectionStart = textarea.selectionEnd = newPos;
  textarea.focus();
}

document.getElementById('loadBtn').addEventListener('click', loadFile);
document.getElementById('saveBtn').addEventListener('click', saveFile);
document.getElementById('deleteBtn').addEventListener('click', deletePassage);
document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => switchTab(t.dataset.tab)));
document.getElementById('passageSearch').addEventListener('input', e => renderPassageList(e.target.value));

window.addEventListener('resize', () => {
  if (!isMobile()) {
    document.getElementById('map').classList.remove('panel-hidden');
    document.getElementById('sidebar').classList.remove('panel-hidden');
  }
  setTimeout(() => map.invalidateSize(), 200);
});
</script>
</body>
</html>
